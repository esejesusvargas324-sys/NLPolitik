{% extends "index.html" %}

{% block content %}
<div id="seccion-registro" class="seccion-inicio-sesion">
  <div class="contenedor-columnas">
    <div class="columna-izquierda-f">
      <div class="icono-sesion">
        <img src="static/img/usuario_nuevo_icono.png">
      </div>
      <div class="titulo-sesion">
        <h2>Registar Usuario</h2>
        <p>Ingresa tus credenciales para crear un usuario en el sistema</p>
      </div>
    </div>
    
    <div class="columna-derecha-f">
      <form id="formulario-registro" class="formulario-registro-layout" method="POST" action="{{ url_for('main.registrar_usuario') }}">

          <div class="grupo-formulario">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" required>
          </div>
        
          <div class="grupo-formulario">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required>
          </div>
        
          <div class="grupo-formulario">
            <label for="password">Contraseña</label>
            <input type="password" id="password"  name="password" required>
          </div>
        
          <div class="grupo-formulario">
            <label for="confirm-password">Confirmar contraseña</label>
            <input type="password" id="confirm-password" name="confirm-password" required>
          </div> 
          <button type="submit" class="boton-sesion"><i class="fa-solid fa-address-card"></i>Registrarse</button>
        
          <div class="enlaces-sesion">
            <a href="{{ url_for('main.inicioSesion') }}">¿Ya tienes cuenta? Inicia sesión</a>
          </div>
      </form>
    </div>
  </div>
</div>
<div class="fondo-animado" id="fondo-animado"></div>
<script src="{{ url_for('static', filename='js/notificacion.js') }}"></script>
<script src="{{ url_for('static', filename='js/inicioSesion.js') }}"></script>
{% endblock %}
